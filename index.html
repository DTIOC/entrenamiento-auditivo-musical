<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Entrenamiento Auditivo - Escalas Pentatónicas y Blues</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 Entrenamiento Auditivo</h1>
            <p>Escucha la melodía y repítela en el teclado</p>
        </header>

        <div class="game-area">
            <div class="controls">
                <button id="btnPlay" class="btn btn-primary">▶️ Escuchar Melodía</button>
                <button id="btnGenerate" class="btn btn-secondary">🎲 Nueva Melodía</button>
                <button id="btnCheck" class="btn btn-success">✓ Verificar</button>
                <button id="btnClear" class="btn btn-warning">🔄 Limpiar</button>
            </div>

            <div class="info-panel">
                <div class="scale-info">
                    <strong>Escala:</strong> <span id="scaleType">-</span>
                </div>
                <div class="notes-info">
                    <strong>Notas:</strong> <span id="noteCount">0</span> notas
                </div>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="score-display" id="scoreDisplay" style="display: none;">
                <h2>Calificación: <span id="scoreValue">0</span>/100</h2>
                <p id="feedbackText"></p>
            </div>
        </div>

        <div class="keyboard" id="keyboard"></div>

        <div class="student-info">
            <h3>Registro de resultados</h3>
            <input type="email" id="studentEmail" placeholder="Correo institucional (opcional)">
            <input type="text" id="studentName" placeholder="Nombre (opcional)">
            <input type="text" id="studentGroup" placeholder="Grupo (opcional)">
        </div>

        <button id="btnSaveResult" class="btn btn-info">💾 Guardar Resultado en Sheets</button>
    </div>

    <script src="app.js"></script>
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
